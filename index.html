<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Readings — Connection Explorer</title>
    <meta
      name="description"
      content="Interactive 3D force-directed graph exploring connections between course readings across audience, topic, focus, and communication style."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #070714;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
      }

      /* ── Tooltip ────────────────────────────────────────── */
      #tooltip {
        position: fixed;
        pointer-events: none;
        background: rgba(12, 12, 30, 0.96);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 18px;
        max-width: 320px;
        color: #e0e0e0;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.2s ease;
        z-index: 100;
        box-shadow:
          0 12px 40px rgba(0, 0, 0, 0.5),
          0 0 80px rgba(99, 102, 241, 0.06);
      }
      #tooltip.visible {
        opacity: 1;
      }
      #tooltip .tt-label {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 2px;
        line-height: 1.35;
      }
      #tooltip .tt-author {
        font-size: 11px;
        font-weight: 600;
        color: rgba(167, 139, 250, 0.8);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }
      #tooltip .tt-text {
        line-height: 1.55;
        color: #a0a0c0;
        font-size: 12.5px;
      }
      #tooltip .tt-badge {
        display: inline-block;
        margin-top: 10px;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      #tooltip .tt-badge.reading {
        background: rgba(34, 197, 94, 0.15);
        color: #4ade80;
        border: 1px solid rgba(34, 197, 94, 0.25);
      }
      #tooltip .tt-connectors {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 10px;
      }
      #tooltip .tt-connector-tag {
        display: inline-block;
        padding: 3px 9px;
        border-radius: 12px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.3px;
        white-space: nowrap;
      }

      /* ── Sidebar ───────────────────────────────────────── */
      #sidebar {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 290px;
        background: rgba(12, 12, 30, 0.88);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        padding: 24px;
        color: #e0e0e0;
        font-size: 13px;
        z-index: 50;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.4),
          0 0 120px rgba(99, 102, 241, 0.03);
      }

      #sidebar .sidebar-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
      }
      #sidebar .sidebar-icon {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
      }
      #sidebar h2 {
        font-size: 17px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.3px;
      }
      #sidebar .sidebar-subtitle {
        font-size: 12px;
        color: rgba(160, 160, 200, 0.6);
        margin-bottom: 20px;
        line-height: 1.5;
      }

      /* Select wrapper */
      .select-wrapper {
        position: relative;
        margin-bottom: 16px;
      }
      .select-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: rgba(167, 139, 250, 0.7);
        margin-bottom: 8px;
        display: block;
      }
      #category-select {
        width: 100%;
        padding: 10px 14px;
        padding-right: 36px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        font-family: "Inter", system-ui, sans-serif;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        transition: all 0.2s ease;
        outline: none;
      }
      #category-select:hover {
        border-color: rgba(99, 102, 241, 0.4);
        background: rgba(99, 102, 241, 0.1);
      }
      #category-select:focus {
        border-color: rgba(99, 102, 241, 0.6);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      }
      #category-select option {
        background: #1a1a2e;
        color: #e0e0e0;
        font-weight: 500;
      }
      .select-arrow {
        position: absolute;
        right: 12px;
        bottom: 13px;
        pointer-events: none;
        color: rgba(167, 139, 250, 0.6);
        font-size: 12px;
      }

      /* Description */
      #category-desc {
        font-size: 12.5px;
        line-height: 1.55;
        color: rgba(160, 160, 200, 0.55);
        margin-bottom: 18px;
        padding-bottom: 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Controls info */
      .controls-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .control-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: rgba(160, 160, 200, 0.5);
      }
      .control-item kbd {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 44px;
        padding: 3px 8px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 6px;
        font-size: 10px;
        font-family: "Inter", monospace;
        font-weight: 600;
        color: rgba(200, 200, 220, 0.6);
        letter-spacing: 0.3px;
      }

      /* Legend */
      .legend {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
      .legend-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: rgba(167, 139, 250, 0.5);
        margin-bottom: 10px;
      }
      .legend-items {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: rgba(160, 160, 200, 0.6);
      }
      .legend-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .legend-dot.field-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .legend-separator {
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
        margin: 6px 0;
      }

      /* ── Ambient animated gradient ─────────────────────── */
      #ambient-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
        background:
          radial-gradient(
            ellipse 600px 400px at 15% 20%,
            rgba(99, 102, 241, 0.04),
            transparent
          ),
          radial-gradient(
            ellipse 500px 500px at 85% 70%,
            rgba(168, 85, 247, 0.03),
            transparent
          ),
          radial-gradient(
            ellipse 400px 300px at 50% 90%,
            rgba(34, 197, 94, 0.02),
            transparent
          );
        animation: ambientShift 20s ease-in-out infinite alternate;
      }
      @keyframes ambientShift {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="ambient-bg"></div>
    <div id="app"></div>
    <div id="tooltip"></div>

    <div id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-icon">🔗</div>
        <h2>Connection Explorer</h2>
      </div>
      <p class="sidebar-subtitle">
        Explore how course readings relate across different dimensions.
      </p>

      <div class="select-wrapper">
        <label class="select-label" for="category-select">Organize By</label>
        <select id="category-select"></select>
        <span class="select-arrow">▼</span>
      </div>

      <p id="category-desc"></p>

      <div class="controls-section">
        <div class="control-item"><kbd>Drag</kbd> Rotate</div>
        <div class="control-item"><kbd>Scroll</kbd> Zoom</div>
        <div class="control-item"><kbd>Hover</kbd> Details</div>
        <div class="control-item"><kbd>Click</kbd> Focus</div>
      </div>

      <div class="legend">
        <div class="legend-title">Connector Key</div>
        <div class="legend-items" id="legend-items">
          <!-- Dynamically populated by main.js -->
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
