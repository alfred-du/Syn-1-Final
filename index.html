<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syn 1 Text Explorer</title>
    <meta
      name="description"
      content="Interactive 3D force-directed graph mapping between Syn 1 readings across audience, topic, focus, and communicatication style."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a110c;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
      }

      /* ── Tooltip ────────────────────────────────────────── */
      #tooltip {
        position: fixed;
        pointer-events: none;
        background: rgba(12, 20, 14, 0.96);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 18px;
        max-width: clamp(240px, 28vw, 320px);
        color: #d4d4c8;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.2s ease;
        z-index: 100;
        box-shadow:
          0 12px 40px rgba(0, 0, 0, 0.5),
          0 0 80px rgba(64, 145, 108, 0.06);
      }
      #tooltip.visible {
        opacity: 1;
      }
      #tooltip .tt-label {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 2px;
        line-height: 1.35;
      }
      #tooltip .tt-author {
        font-size: 11px;
        font-weight: 600;
        color: rgba(188, 162, 100, 0.85);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }
      #tooltip .tt-text {
        line-height: 1.55;
        color: #a0a89a;
        font-size: 12.5px;
      }
      #tooltip .tt-badge {
        display: inline-block;
        margin-top: 10px;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      #tooltip .tt-badge.reading {
        background: rgba(88, 129, 87, 0.2);
        color: #7dab7a;
        border: 1px solid rgba(88, 129, 87, 0.35);
      }
      #tooltip .tt-connectors {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 10px;
      }
      #tooltip .tt-connector-tag {
        display: inline-block;
        padding: 3px 9px;
        border-radius: 12px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.3px;
        white-space: nowrap;
      }

      /* ── Sidebar ───────────────────────────────────────── */
      #sidebar {
        position: fixed;
        top: clamp(10px, 2vh, 20px);
        left: clamp(10px, 2vw, 20px);
        width: clamp(220px, 22vw, 320px);
        max-height: calc(100vh - clamp(20px, 4vh, 40px));
        overflow-y: auto;
        background: rgba(12, 20, 14, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: clamp(12px, 1.5vw, 18px);
        padding: clamp(14px, 2vw, 24px);
        color: #d4d4c8;
        font-size: clamp(11px, 1.1vw, 13px);
        z-index: 50;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.4),
          0 0 120px rgba(64, 145, 108, 0.03);
      }

      /* Hide scrollbar but keep scrollable */
      #sidebar::-webkit-scrollbar {
        width: 4px;
      }
      #sidebar::-webkit-scrollbar-track {
        background: transparent;
      }
      #sidebar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
      }

      #sidebar .sidebar-header {
        display: flex;
        align-items: center;
        gap: clamp(6px, 0.8vw, 10px);
        margin-bottom: 6px;
      }
      #sidebar .sidebar-icon {
        width: clamp(28px, 3vw, 36px);
        height: clamp(28px, 3vw, 36px);
        border-radius: 8px;
        flex-shrink: 0;
        overflow: hidden;
      }
      #sidebar .sidebar-icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      #sidebar h2 {
        font-size: clamp(14px, 1.4vw, 17px);
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.3px;
      }
      #sidebar .sidebar-subtitle {
        font-size: clamp(10px, 1vw, 12px);
        color: rgba(160, 168, 154, 0.6);
        margin-bottom: clamp(12px, 1.5vw, 20px);
        line-height: 1.5;
      }

      /* Select wrapper */
      .select-wrapper {
        position: relative;
        margin-bottom: 16px;
      }
      .select-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: rgba(140, 170, 100, 0.7);
        margin-bottom: 8px;
        display: block;
      }
      #category-select {
        width: 100%;
        padding: 10px 14px;
        padding-right: 36px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        font-family: "Inter", system-ui, sans-serif;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        transition: all 0.2s ease;
        outline: none;
      }
      #category-select:hover {
        border-color: rgba(88, 129, 87, 0.4);
        background: rgba(88, 129, 87, 0.1);
      }
      #category-select:focus {
        border-color: rgba(88, 129, 87, 0.6);
        box-shadow: 0 0 0 3px rgba(88, 129, 87, 0.15);
      }
      #category-select option {
        background: #1a2418;
        color: #e0e0e0;
        font-weight: 500;
      }
      .select-arrow {
        position: absolute;
        right: 12px;
        bottom: 13px;
        pointer-events: none;
        color: rgba(140, 170, 100, 0.6);
        font-size: 12px;
      }

      /* Description */
      #category-desc {
        font-size: 12.5px;
        line-height: 1.55;
        color: rgba(160, 168, 154, 0.55);
        margin-bottom: 18px;
        padding-bottom: 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Controls info */
      .controls-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .control-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: rgba(160, 168, 154, 0.5);
      }
      .control-item kbd {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 44px;
        padding: 3px 8px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 6px;
        font-size: 10px;
        font-family: "Inter", monospace;
        font-weight: 600;
        color: rgba(200, 200, 190, 0.6);
        letter-spacing: 0.3px;
      }

      /* Legend */
      .legend {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
      .legend-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: rgba(140, 170, 100, 0.5);
        margin-bottom: 10px;
      }
      .legend-items {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: rgba(160, 168, 154, 0.6);
      }
      .legend-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .legend-dot.field-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .legend-separator {
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
        margin: 6px 0;
      }

      /* ── Ambient animated gradient ─────────────────────── */
      #ambient-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
        background:
          radial-gradient(
            ellipse 600px 400px at 15% 20%,
            rgba(45, 106, 79, 0.06),
            transparent
          ),
          radial-gradient(
            ellipse 500px 500px at 85% 70%,
            rgba(139, 111, 71, 0.04),
            transparent
          ),
          radial-gradient(
            ellipse 400px 300px at 50% 90%,
            rgba(88, 129, 87, 0.03),
            transparent
          );
        animation: ambientShift 20s ease-in-out infinite alternate;
      }
      @keyframes ambientShift {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
        100% {
          opacity: 1;
        }
      }

      /* ── Responsive: small screens ──────────────────────── */
      @media (max-width: 600px) {
        #sidebar {
          top: auto;
          bottom: 0;
          left: 0;
          right: 0;
          width: 100%;
          max-height: 45vh;
          border-radius: 18px 18px 0 0;
          padding: 16px 18px;
        }
        .controls-section {
          gap: 4px;
        }
        .legend {
          margin-top: 10px;
          padding-top: 10px;
        }
      }

      @media (max-height: 600px) {
        #sidebar {
          max-height: calc(100vh - 20px);
        }
        .legend-items {
          gap: 4px;
        }
      }
    </style>
  </head>
  <body>
    <div id="ambient-bg"></div>
    <div id="app"></div>
    <div id="tooltip"></div>

    <div id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-icon"><img src="/Seventh College Logo.png" alt="Seventh College" /></div>
        <h2>Syn 1 Text Explorer</h2>
      </div>
      <p class="sidebar-subtitle">
        Map the connections between Synthesis readings across audience, topic, focus, and communication style.
      </p>

      <div class="select-wrapper">
        <label class="select-label" for="category-select">Organize By</label>
        <select id="category-select"></select>
        <span class="select-arrow">▼</span>
      </div>

      <p id="category-desc"></p>

      <div class="controls-section">
        <div class="control-item"><kbd>Drag</kbd> Rotate</div>
        <div class="control-item"><kbd>Scroll</kbd> Zoom</div>
        <div class="control-item"><kbd>Hover</kbd> Details</div>
        <div class="control-item"><kbd>Click</kbd> Focus</div>
      </div>

      <div class="legend">
        <div class="legend-title">Connector Key</div>
        <div class="legend-items" id="legend-items">
          <!-- Dynamically populated by main.js -->
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
